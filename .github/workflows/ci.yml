name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

env:
    NODE_LTS_VERSION: 22

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [20, "${{ env.NODE_LTS_VERSION }}"]

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm build

            - name: Lint
              run: pnpm lint

            - name: Test
              run: pnpm test
