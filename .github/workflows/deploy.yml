name: Deploy

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

env:
    NODE_LTS_VERSION: 22
    VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
    VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

concurrency:
    group: deploy-${{ github.ref }}
    cancel-in-progress: true

jobs:
    deploy:
        runs-on: ubuntu-latest
        env:
            VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        environment:
            name: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
            url: ${{ steps.deploy.outputs.url }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_LTS_VERSION }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Pull Vercel environment
              if: env.VERCEL_TOKEN != ''
              run: pnpm dlx vercel@latest pull --yes --environment=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }} --token=${{ env.VERCEL_TOKEN }}

            - name: Build project
              if: env.VERCEL_TOKEN != ''
              run: pnpm dlx vercel@latest build ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ env.VERCEL_TOKEN }}

            - name: Deploy to Vercel
              id: deploy
              if: env.VERCEL_TOKEN != ''
              run: |
                  URL=$(pnpm dlx vercel@latest deploy --prebuilt ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ env.VERCEL_TOKEN }})
                  echo "url=$URL" >> "$GITHUB_OUTPUT"

            - name: Summary
              if: steps.deploy.outputs.url != ''
              run: |
                  echo "### Deployed" >> "$GITHUB_STEP_SUMMARY"
                  echo "${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"

            - name: PR comment
              if: env.VERCEL_TOKEN != '' && steps.deploy.outputs.url != '' && github.event_name == 'pull_request'
              uses: actions/github-script@v7
              with:
                  script: |
                      const url = "${{ steps.deploy.outputs.url }}";
                      const body = `### Preview deployment\n\n${url}`;
                      const { data: comments } = await github.rest.issues.listComments({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                      });
                      const existing = comments.find(
                          c => c.user.login === "github-actions[bot]" && c.body.startsWith("### Preview deployment")
                      );
                      if (existing) {
                          await github.rest.issues.updateComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              comment_id: existing.id,
                              body,
                          });
                      } else {
                          await github.rest.issues.createComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              issue_number: context.issue.number,
                              body,
                          });
                      }
